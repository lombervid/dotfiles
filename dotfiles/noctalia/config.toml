[bar.main]
capsule = false
capsule_radius = 10.0
capsule_opacity = 0.5
capsule_padding = 10.0
margin_edge = 0
margin_ends = 0
padding = 10
radius = 0
background_opacity = 0.0
shadow = false
widget_spacing = 10
start = [ "group:cpu-stats", "group:gpu-stats", "ram", "media", "lock_keys" ]
center = [ "workspaces" ]
end = [ "battery", "tray", "group:system-settings", "windows_clock", "notifications" ]

[[bar.main.capsule_group]]
id = "cpu-stats"
members = [ "cpu", "temp" ]
fill = "surface_variant"
opacity = 0.5
padding = 10.0
radius = 10.0

[[bar.main.capsule_group]]
id = "gpu-stats"
members = [ "gpu", "gpu_temp" ]
fill = "surface_variant"
opacity = 0.5
padding = 10.0
radius = 10.0

[[bar.main.capsule_group]]
id = "system-settings"
members = [ "bluetooth", "network", "volume", "keyboard_layout" ]
fill = "surface_variant"
opacity = 0.5
padding = 10.0
radius = 10.0

[theme]
builtin = "Tokyo-Night"

[wallpaper]
directory = "~/Pictures/Wallpapers/"
enabled = true

[backdrop]
enabled = true
tint_intensity = 0.40

[osd]
orientation = "vertical"
position = "center_right"

[shell]
settings_show_advanced = true
clipboard_auto_paste = "auto"
clipboard_image_action_command = "satty -f -"
polkit_agent = true
show_location = false
telemetry_enabled = true

[shell.panel]
open_near_click_control_center = true
transparency_mode = "glass"
control_center_placement = "floating"
session_placement = "centered"
wallpaper_placement = "centered"

[notification]
position = "bottom_right"

[brightness]
enable_ddcutil = true

[widget.tray]
drawer = true
drawer_columns = 4

[widget.windows_clock]
type = "clock"
format = "{:%-I:%M %P}\n{:%d/%m/%Y}"
tooltip_format = "{:%A, %B %d}"

[widget.lock_keys]
anchor = false
display = "full"
hide_when_off = true
show_num_lock = false

[widget.network]
show_label = false

[widget.battery]
display_mode = "graphic"
hide_when_full = true
show_label = false

[widget.volume]
show_label = false

[widget.gpu]
stat = "gpu_usage"
type = "sysmon"

[widget.gpu_temp]
stat = "gpu_temp"
type = "sysmon"

[widget.media]
title_scroll = "on_hover"
hide_when_no_media = true

[widget.keyboard_layout]
hide_when_single_layout = true
show_label = false

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "dark_mode"

[[control_center.shortcuts]]
type = "power_profile"

[[control_center.shortcuts]]
type = "wallpaper"

[[control_center.shortcuts]]
type = "session"
