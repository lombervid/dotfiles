[bar.main]
capsule = false
capsule_radius = 10.0
capsule_opacity = 0.5
capsule_padding = 10.0
margin_edge = 0
margin_ends = 0
padding = 10
radius = 0
background_opacity = 0.0
shadow = false
widget_spacing = 10
start = [ "group:hardware", "media", "lock_keys" ]
center = [ "workspaces" ]
end = [ "battery", "tray", "group:system-settings", "windows_clock", "notifications" ]

[[bar.main.capsule_group]]
id = "hardware"
members = [ "ram", "temp", "gpu_temp" ]
fill = "surface_variant"
opacity = 0.5
padding = 10.0
radius = 10.0

[[bar.main.capsule_group]]
id = "system-settings"
members = [ "bluetooth", "network", "volume", "keyboard_layout" ]
fill = "surface_variant"
opacity = 0.5
padding = 10.0
radius = 10.0

[theme]
builtin = "Tokyo-Night"

[system.monitor]
gpu_poll_seconds = 5

[wallpaper]
directory = "~/Pictures/Wallpapers/"
enabled = true

[backdrop]
enabled = true
tint_intensity = 0.40

[osd]
orientation = "vertical"
position = "center_right"

[shell]
settings_show_advanced = true
clipboard_auto_paste = "auto"
clipboard_confirm_clear_history = false
clipboard_image_action_command = "satty -f -"
polkit_agent = true
show_location = false
telemetry_enabled = true

[shell.panel]
open_near_click_control_center = true
transparency_mode = "glass"
control_center_placement = "floating"
session_placement = "centered"
wallpaper_placement = "centered"

[notification]
position = "bottom_right"

[brightness]
enable_ddcutil = true

[widget.tray]
drawer = true
drawer_columns = 4

[widget.windows_clock]
type = "clock"
format = "{:%-I:%M %P}\n{:%d/%m/%Y}"
tooltip_format = "{:%A, %B %d}"
capsule = false

[widget.lock_keys]
anchor = false
display = "full"
hide_when_off = true
show_num_lock = false

[widget.network]
show_label = false

[widget.battery]
display_mode = "graphic"
hide_when_full = true

[widget.volume]
show_label = false

[widget.ram]
show_label = false

[widget.gpu_temp]
stat = "gpu_temp"
type = "sysmon"

[widget.media]
title_scroll = "on_hover"
hide_when_no_media = true
capsule_padding = 2.0
art_size = 22.0

[widget.workspaces]
anchor = true
capsule = false
hide_when_empty = true
labels_only_when_occupied = true

[widget.keyboard_layout]
hide_when_single_layout = true
show_label = false

[widget.notifications]
capsule = false

[control_center]
sidebar_section = "none"

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "dark_mode"

[[control_center.shortcuts]]
type = "power_profile"

[[control_center.shortcuts]]
type = "wallpaper"

[[control_center.shortcuts]]
type = "session"
